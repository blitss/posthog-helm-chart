{{- if .Values.seaweedfs.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-seaweedfs
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "seaweedfs") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8333
      targetPort: 8333
      protocol: TCP
      name: s3
    - port: 9333
      targetPort: 9333
      protocol: TCP
      name: master
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "seaweedfs") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-seaweedfs
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "seaweedfs") | nindent 4 }}
spec:
  serviceName: {{ include "posthog.fullname" . }}-seaweedfs
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "seaweedfs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "seaweedfs") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "seaweedfs") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "seaweedfs") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "seaweedfs") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "seaweedfs") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "seaweedfs") | nindent 6 }}
      containers:
        - name: seaweedfs
          image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "seaweedfs") | nindent 10 }}
          command:
            - weed
            - server
            - -s3
            - -dir=/data
          ports:
            - containerPort: 8333
              name: s3
            - containerPort: 9333
              name: master
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.seaweedfs.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /cluster/status
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /cluster/status
              port: 9333
            initialDelaySeconds: 30
            periodSeconds: 15
  {{- if .Values.seaweedfs.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.seaweedfs.persistence.storageClass }}
        storageClassName: {{ .Values.seaweedfs.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.seaweedfs.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
