{{- if .Values.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-kafka
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "kafka") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      protocol: TCP
      name: kafka
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-kafka
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "kafka") | nindent 4 }}
spec:
  serviceName: {{ include "posthog.fullname" . }}-kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "kafka") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "kafka") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "kafka") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "kafka") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "kafka") | nindent 6 }}
      containers:
        - name: redpanda
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy | default "IfNotPresent" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "kafka") | nindent 10 }}
          command:
            - /bin/bash
            - -c
            - |
              cat > /tmp/redpanda.yaml <<'RPCONF'
              redpanda:
                developer_mode: {{ .Values.kafka.developerMode | default false }}
                auto_create_topics_enabled: true
                node_id: 0
                data_directory: /var/lib/redpanda/data
                kafka_api:
                  - address: "0.0.0.0"
                    port: 9092
                    name: internal
                advertised_kafka_api:
                  - address: "{{ include "posthog.fullname" . }}-kafka"
                    port: 9092
                    name: internal
                admin:
                  - address: "0.0.0.0"
                    port: 9644
              RPCONF
              exec /opt/redpanda/bin/redpanda \
                --redpanda-cfg /tmp/redpanda.yaml \
                --smp=1 \
                --reserve-memory=0M \
                --overprovisioned \
                --unsafe-bypass-fsync={{ .Values.kafka.developerMode | default false }} \
                --lock-memory=false
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9644
              name: admin
          env:
            - name: KAFKA_LOG_RETENTION_MS
              value: {{ .Values.kafka.logRetentionMs | quote }}
            - name: KAFKA_LOG_RETENTION_HOURS
              value: {{ .Values.kafka.logRetentionHours | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 15
  {{- if .Values.kafka.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.kafka.persistence.storageClass }}
        storageClassName: {{ .Values.kafka.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
