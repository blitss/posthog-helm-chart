{{- if .Values.web.enabled }}
## ------------------------------------------------------------------
## PostHog Web (Django app)
## ------------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-web
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "web") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "web") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-web
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "web") | nindent 4 }}
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "web") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "web") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "web") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "web") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "web") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "web") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "web") | nindent 6 }}
      terminationGracePeriodSeconds: 120
      containers:
        - name: web
          image: "{{ include "posthog.imageRef" (dict "root" . "component" "web" "fallbackComponent" "posthog") }}"
          imagePullPolicy: {{ include "posthog.imagePullPolicy" (dict "root" . "component" "web" "fallbackComponent" "posthog") }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "web") | nindent 10 }}
          {{- if .Values.web.granian.enabled }}
          command:
            - granian
            - --interface
            - asgi
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - {{ .Values.web.granian.workers | default 2 | quote }}
            - posthog.asgi:application
          {{- end }}
          ports:
            - containerPort: 8000
              name: http
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: USE_GRANIAN
              value: {{ .Values.web.granian.enabled | default true | quote }}
            - name: GRANIAN_WORKERS
              value: {{ .Values.web.granian.workers | default 2 | quote }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- with .Values.web.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /preflight
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /preflight
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            httpGet:
              path: /preflight
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
        {{- with .Values.web.sidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.worker.enabled }}
## ------------------------------------------------------------------
## PostHog Worker (Celery)
## ------------------------------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-worker
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "worker") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "worker") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "worker") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "worker") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "worker") | nindent 6 }}
      terminationGracePeriodSeconds: 300
      containers:
        - name: worker
          image: "{{ include "posthog.imageRef" (dict "root" . "component" "worker" "fallbackComponent" "posthog") }}"
          imagePullPolicy: {{ include "posthog.imagePullPolicy" (dict "root" . "component" "worker" "fallbackComponent" "posthog") }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "worker") | nindent 10 }}
          command:
            - ./bin/docker-worker-celery
            - --with-scheduler
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            {{- $hasWorkerConcurrency := false }}
            {{- range .Values.worker.extraEnv }}
            {{- if eq .name "CELERY_WORKER_CONCURRENCY" }}{{ $hasWorkerConcurrency = true }}{{ end }}
            {{- end }}
            {{- if not $hasWorkerConcurrency }}
            - name: CELERY_WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | default 4 | quote }}
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- with .Values.worker.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.worker.sidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.worker.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.workerExports.enabled }}
## ------------------------------------------------------------------
## PostHog Worker Exports (Celery exports queue)
## ------------------------------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-worker-exports
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "worker-exports") | nindent 4 }}
spec:
  {{- if not .Values.workerExports.autoscaling.enabled }}
  replicas: {{ .Values.workerExports.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "worker-exports") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "worker-exports") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "workerExports") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "workerExports") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "workerExports") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "workerExports") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "workerExports") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "worker-exports") | nindent 6 }}
      terminationGracePeriodSeconds: 300
      containers:
        - name: worker-exports
          image: "{{ include "posthog.imageRef" (dict "root" . "component" "workerExports" "fallbackComponent" "posthog") }}"
          imagePullPolicy: {{ include "posthog.imagePullPolicy" (dict "root" . "component" "workerExports" "fallbackComponent" "posthog") }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "workerExports") | nindent 10 }}
          command:
            - ./bin/docker-worker-celery
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            - name: CELERY_WORKER_QUEUES
              value: {{ .Values.workerExports.queue | default "exports" | quote }}
            {{- $hasExportsConcurrency := false }}
            {{- range .Values.workerExports.extraEnv }}
            {{- if eq .name "CELERY_WORKER_CONCURRENCY" }}{{ $hasExportsConcurrency = true }}{{ end }}
            {{- end }}
            {{- if not $hasExportsConcurrency }}
            - name: CELERY_WORKER_CONCURRENCY
              value: {{ .Values.workerExports.concurrency | default 2 | quote }}
            {{- end }}
            {{- with .Values.workerExports.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.workerExports.resources | nindent 12 }}
          {{- with .Values.workerExports.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.workerExports.sidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.workerExports.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.plugins.enabled }}
## ------------------------------------------------------------------
## PostHog Plugins (Node.js - CDP, webhooks, session recording API)
## ------------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-plugins
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "plugins") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6738
      targetPort: 6738
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "plugins") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-plugins
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "plugins") | nindent 4 }}
spec:
  {{- if not .Values.plugins.autoscaling.enabled }}
  replicas: {{ .Values.plugins.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "plugins") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "plugins") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "plugins") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "plugins") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "plugins") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "plugins") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "plugins") | nindent 6 }}
      {{- include "posthog.topologySpreadConstraints" (dict "root" . "component" "plugins") | nindent 6 }}
      terminationGracePeriodSeconds: 60
      {{- if .Values.geoip.enabled }}
      initContainers:
        {{- include "posthog.geoipInitContainer" (dict "root" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: plugins
          image: "{{ .Values.plugins.image.repository }}:{{ .Values.plugins.image.tag }}"
          imagePullPolicy: {{ .Values.plugins.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "plugins") | nindent 10 }}
          ports:
            - containerPort: 6738
              name: http
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
            {{- $redisHost := .Values.externalRedis.url | default (printf "%s-redis" (include "posthog.fullname" .)) }}
            - name: SESSION_RECORDING_API_REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: SESSION_RECORDING_API_REDIS_PORT
              value: "6379"
            - name: CDP_REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: CDP_REDIS_PORT
              value: "6379"
            - name: LOGS_REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: LOGS_REDIS_PORT
              value: "6379"
            - name: LOGS_REDIS_TLS
              value: "false"
            - name: COOKIELESS_REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
            {{- if .Values.geoip.enabled }}
            {{- include "posthog.geoipEnv" (dict "root" .) | nindent 12 }}
            {{- end }}
            {{- with .Values.plugins.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.plugins.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.geoip.enabled }}
            {{- include "posthog.geoipVolumeMount" (dict "root" .) | nindent 12 }}
            {{- end }}
            {{- with .Values.plugins.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /_ready
              port: 6738
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_health
              port: 6738
            initialDelaySeconds: 30
            periodSeconds: 15
        {{- with .Values.plugins.sidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        {{- if .Values.geoip.enabled }}
        {{- include "posthog.geoipVolume" (dict "root" .) | nindent 8 }}
        {{- end }}
        {{- with .Values.plugins.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
