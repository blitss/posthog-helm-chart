{{- if and .Values.kafkaInit.enabled .Values.kafka.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-kafka-init
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "kafka-init") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka-init") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "kafka") | nindent 6 }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "kafka") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until rpk cluster info --brokers {{ include "posthog.fullname" . }}-kafka:9092 2>/dev/null; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is ready!"
      containers:
        - name: kafka-init
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "kafka") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              {{- range .Values.kafkaInit.topics }}
              rpk topic create {{ . }} --brokers {{ include "posthog.fullname" $ }}-kafka:9092 || true
              {{- end }}
              echo "All topics created successfully."
{{- end }}
{{- if and .Values.migrate.enabled (not .Values.clickhouse.enabled) (.Values.externalClickhouse.createDatabase | default true) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-bootstrap-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "bootstrap-clickhouse") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "bootstrap-clickhouse") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "web") | nindent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: bootstrap-clickhouse
          image: "{{ .Values.posthog.image.repository }}:{{ .Values.posthog.image.tag }}"
          imagePullPolicy: {{ .Values.posthog.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "web") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              cat >/tmp/bootstrap_clickhouse.py <<'PY'
              import base64
              import os
              import ssl
              import time
              import urllib.parse
              import urllib.request

              scheme = "https" if os.getenv("CLICKHOUSE_SECURE", "false").lower() == "true" else "http"
              host = os.environ["CLICKHOUSE_HOST"]
              port = "8443" if scheme == "https" else "8123"
              database = os.environ["CLICKHOUSE_DATABASE"]
              user = os.getenv("CLICKHOUSE_USER") or os.getenv("CLICKHOUSE_API_USER")
              password = os.getenv("CLICKHOUSE_PASSWORD") or os.getenv("CLICKHOUSE_API_PASSWORD", "")
              verify = os.getenv("CLICKHOUSE_VERIFY", "false").lower() == "true"

              def execute(query):
                  url = f"{scheme}://{host}:{port}/?query=" + urllib.parse.quote(query)
                  request = urllib.request.Request(url, data=b"", method="POST")
                  if user:
                      token = base64.b64encode(f"{user}:{password}".encode()).decode()
                      request.add_header("Authorization", f"Basic {token}")

                  context = None
                  if scheme == "https" and not verify:
                      context = ssl._create_unverified_context()

                  with urllib.request.urlopen(request, context=context, timeout=30) as response:
                      body = response.read().decode().strip()
                      print(response.status)
                      if body:
                          print(body)
                      return body

              def wait_for(query, expected, label, attempts=60, delay=2):
                  for attempt in range(1, attempts + 1):
                      try:
                          result = execute(query)
                          if result == expected:
                              print(f"{label} ready")
                              return
                      except Exception as err:
                          print(f"{label} check {attempt}/{attempts} failed: {err}")
                      time.sleep(delay)
                  raise SystemExit(f"Timed out waiting for {label}")

              wait_for("SELECT 1 FORMAT TabSeparatedRaw", "1", "clickhouse")
              execute(f"CREATE DATABASE IF NOT EXISTS `{database}`")
              execute("SYSTEM FLUSH LOGS")
              system_log_query = (
                  "SELECT count() "
                  "FROM system.tables "
                  "WHERE database = 'system' "
                  "AND name IN ('crash_log', 'error_log', 'metric_log') "
                  "FORMAT TabSeparatedRaw"
              )
              wait_for(
                  system_log_query,
                  "3",
                  "system log tables",
              )
              PY
              /python-runtime/bin/python /tmp/bootstrap_clickhouse.py
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
{{- end }}
{{- if .Values.migrate.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-migrate-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "migrate-clickhouse") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "7"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "migrate-clickhouse") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "web") | nindent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: migrate-clickhouse
          image: "{{ .Values.posthog.image.repository }}:{{ .Values.posthog.image.tag }}"
          imagePullPolicy: {{ .Values.posthog.image.pullPolicy | default "Always" }}
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "web") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              cat >/tmp/clickhouse_preflight.py <<'PY'
              import base64
              import os
              import ssl
              import time
              import urllib.parse
              import urllib.request

              scheme = "https" if os.getenv("CLICKHOUSE_SECURE", "false").lower() == "true" else "http"
