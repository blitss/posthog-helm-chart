{{- if not .Values.existingSecret }}
{{- $secretName := printf "%s-secrets" (include "posthog.fullname" .) -}}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $existingData := $existingSecret.data | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "posthog.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Preserve posthog-secret across upgrades; generate only on first install */}}
  posthog-secret: {{ .Values.posthog.secret | default (index $existingData "posthog-secret" | default "" | b64dec) | default (randAlphaNum 56) | quote }}
  {{- /* Preserve encryption-salt-keys across upgrades */}}
  encryption-salt-keys: {{ .Values.posthog.encryptionSaltKeys | default (index $existingData "encryption-salt-keys" | default "" | b64dec) | default (randAlphaNum 32) | quote }}
  database-url: {{ include "posthog.databaseUrl" . | quote }}
  redis-url: {{ include "posthog.redisUrl" . | quote }}
  {{- if .Values.clickhouse.enabled }}
  clickhouse-api-password: {{ .Values.clickhouse.apiPassword | default "apipass" | quote }}
  clickhouse-app-password: {{ .Values.clickhouse.appPassword | default "apppass" | quote }}
  {{- end }}
  {{- if .Values.rustfs.enabled }}
  object-storage-access-key: {{ .Values.rustfs.secret.rustfs.access_key | quote }}
  object-storage-secret-key: {{ .Values.rustfs.secret.rustfs.secret_key | quote }}
  seaweedfs-access-key: {{ .Values.rustfs.secret.rustfs.access_key | quote }}
  seaweedfs-secret-key: {{ .Values.rustfs.secret.rustfs.secret_key | quote }}
  {{- else }}
  object-storage-access-key: {{ .Values.externalObjectStorage.accessKey | quote }}
  object-storage-secret-key: {{ .Values.externalObjectStorage.secretKey | quote }}
  seaweedfs-access-key: {{ .Values.externalSeaweedfs.accessKey | default "any" | quote }}
  seaweedfs-secret-key: {{ .Values.externalSeaweedfs.secretKey | default "any" | quote }}
  {{- end }}
  {{- /* Always include postgresql-password — needed by Temporal and other consumers */}}
  {{- if .Values.postgresql.enabled }}
  postgresql-password: {{ .Values.postgresql.auth.password | quote }}
  {{- else }}
  postgresql-password: {{ .Values.externalPostgresql.password | default "posthog" | quote }}
  {{- end }}
{{- end }}
