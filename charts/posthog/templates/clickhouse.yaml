{{- if .Values.clickhouse.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: native
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-clickhouse
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
spec:
  serviceName: {{ include "posthog.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "clickhouse") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "clickhouse") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "clickhouse") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "clickhouse") | nindent 6 }}
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "clickhouse") | nindent 10 }}
          ports:
            - containerPort: 9000
              name: native
            - containerPort: 8123
              name: http
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.database | quote }}
            - name: KAFKA_HOSTS
              value: {{ .Values.externalKafka.brokers | default (printf "%s-kafka:9092" (include "posthog.fullname" .)) | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d/zookeeper.xml
              subPath: zookeeper.xml
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d/kafka.xml
              subPath: kafka.xml
            - name: clickhouse-users
              mountPath: /etc/clickhouse-server/users.d/users.xml
              subPath: users.xml
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: clickhouse-config
          configMap:
            name: {{ include "posthog.fullname" . }}-clickhouse-config
        - name: clickhouse-users
          secret:
            secretName: {{ include "posthog.fullname" . }}-clickhouse-users
        {{- if not .Values.clickhouse.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "posthog.fullname" . }}-clickhouse-config
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
data:
  zookeeper.xml: |
    <clickhouse>
      <zookeeper>
        <node>
          <host>{{ include "posthog.fullname" . }}-zookeeper</host>
          <port>2181</port>
        </node>
      </zookeeper>
    </clickhouse>
  kafka.xml: |
    <clickhouse>
      <kafka>
        <broker_list>{{ .Values.externalKafka.brokers | default (printf "%s-kafka:9092" (include "posthog.fullname" .)) }}</broker_list>
      </kafka>
    </clickhouse>
---
## ClickHouse user passwords stored in a Secret instead of a ConfigMap
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "posthog.fullname" . }}-clickhouse-users
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
type: Opaque
stringData:
  users.xml: |
    <clickhouse>
      <users>
        <api>
          <password>{{ .Values.clickhouse.apiPassword }}</password>
          <networks><ip>::/0</ip></networks>
          <profile>default</profile>
          <quota>default</quota>
        </api>
        <app>
          <password>{{ .Values.clickhouse.appPassword }}</password>
          <networks><ip>::/0</ip></networks>
          <profile>default</profile>
          <quota>default</quota>
        </app>
      </users>
    </clickhouse>
{{- end }}
