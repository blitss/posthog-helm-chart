{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "posthog.fullname" . }}-redis
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "posthog.fullname" . }}-redis
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "posthog.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 8 }}
      annotations:
        {{- include "posthog.podAnnotations" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "redis") | nindent 6 }}
      {{- include "posthog.nodeSelector" (dict "root" . "component" "redis") | nindent 6 }}
      {{- include "posthog.tolerations" (dict "root" . "component" "redis") | nindent 6 }}
      {{- include "posthog.affinity" (dict "root" . "component" "redis") | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "redis") | nindent 10 }}
          command:
            - redis-server
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
