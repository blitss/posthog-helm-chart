cyclotronJanitor:
  enabled: true
  image:
    repository: ghcr.io/posthog/posthog/cyclotron-janitor
    tag: master
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []

temporalDjangoWorker:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

## ------------------------------------------------------------------
## Init Jobs
## ------------------------------------------------------------------
migrate:
  ## Run Django migrations on install/upgrade
  enabled: true

kafkaInit:
  ## Create required Kafka topics on install
  enabled: true
  topics:
  - clickhouse_events_json
  - events_plugin_ingestion
  - events_plugin_ingestion_overflow
  - events_plugin_ingestion_historical
  - exceptions_ingestion
  - session_recording_snapshot_item_events
  - session_recording_snapshot_item_overflow
  - clickhouse_app_metrics2
  - heatmaps_ingestion
  - logs_ingestion
  - error_tracking_events

asyncMigrationsCheck:
  enabled: true

## ------------------------------------------------------------------
## Network Policies
## ------------------------------------------------------------------
networkPolicies:
  enabled: false

## ------------------------------------------------------------------
## Prometheus Monitoring
## ------------------------------------------------------------------
metrics:
  ## Enable ServiceMonitor/PodMonitor creation (requires prometheus-operator CRDs)
  enabled: false
  serviceMonitor:
    ## Additional labels for ServiceMonitor (e.g. release: kube-prometheus-stack)
    additionalLabels: {}
    ## Scrape interval
    interval: 30s
    ## Scrape timeout
    scrapeTimeout: 10s
