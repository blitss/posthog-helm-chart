name: publish-posthog-artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-posthog-artifacts.yaml
      - vendor/posthog/**
      - charts/posthog/**
      - images/clickhouse/Dockerfile
      - manifests/kubeblocks/posthog-clickhouse-component-version.yaml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/posthog-clickhouse
  CHART_PATH: charts/posthog

jobs:
  build-clickhouse:
    name: build clickhouse image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive ClickHouse base tag
        id: clickhouse
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$(awk '$1=="FROM"{ref=$2} END{print ref}' images/clickhouse/Dockerfile)"
          IMAGE_NO_DIGEST="${IMAGE_REF%%@*}"
          BASE_TAG="${IMAGE_NO_DIGEST##*:}"
          if [[ -z "${BASE_TAG}" || "${BASE_TAG}" == "${IMAGE_NO_DIGEST}" ]]; then
            echo "Failed to parse ClickHouse tag from: ${IMAGE_REF}" >&2
            exit 1
          fi
          echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/clickhouse/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.clickhouse.outputs.base_tag }}-${{ matrix.arch }}

  publish-clickhouse-manifest:
    name: publish clickhouse manifest
    needs: build-clickhouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive ClickHouse base tag
        id: clickhouse
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$(awk '$1=="FROM"{ref=$2} END{print ref}' images/clickhouse/Dockerfile)"
          IMAGE_NO_DIGEST="${IMAGE_REF%%@*}"
          BASE_TAG="${IMAGE_NO_DIGEST##*:}"
          echo "base_tag=${BASE_TAG}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.clickhouse.outputs.base_tag }}" \
            -t "${IMAGE}:sha-${GITHUB_SHA::12}" \
            "${IMAGE}:${{ steps.clickhouse.outputs.base_tag }}-amd64" \
            "${IMAGE}:${{ steps.clickhouse.outputs.base_tag }}-arm64"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker buildx imagetools create \
              -t "${IMAGE}:latest" \
              "${IMAGE}:${{ steps.clickhouse.outputs.base_tag }}"
          fi

          docker buildx imagetools inspect "${IMAGE}:${{ steps.clickhouse.outputs.base_tag }}"

  publish-chart:
    name: publish helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        shell: bash
        run: |
          set -euo pipefail
          # Subchart tarballs are committed under charts/posthog/charts/, so
          # no dependency build / repo add is needed here.
          helm lint "${CHART_PATH}"
          helm template posthog "${CHART_PATH}" >/dev/null

      - name: Log in to GHCR for Helm
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${GITHUB_ACTOR}" --password-stdin

      - name: Package and push chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${CHART_PATH}" --destination dist
          helm push dist/posthog-*.tgz "oci://${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/charts"
