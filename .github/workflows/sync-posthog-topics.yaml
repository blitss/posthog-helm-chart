name: sync-posthog-topics

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (mikefarah)
        run: |
          set -euo pipefail
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Kafka topics from upstream
        run: bash scripts/update-topics.sh

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- charts/posthog/values.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-posthog-topics
          base: main
          delete-branch: true
          commit-message: "chore: sync PostHog Kafka topics"
          title: "chore: sync PostHog Kafka topics"
          body: |
            Automated sync of `kafka.provisioning.topics` and `kafkaInit.topics`
            in `charts/posthog/values.yaml` from upstream PostHog sources:

            - [`posthog/kafka_client/topics.py`](https://github.com/PostHog/posthog/blob/master/posthog/kafka_client/topics.py)
            - [`nodejs/src/config/kafka-topics.ts`](https://github.com/PostHog/posthog/blob/master/nodejs/src/config/kafka-topics.ts)

            Generated by `scripts/update-topics.sh`.
          labels: |
            automated
            dependencies
