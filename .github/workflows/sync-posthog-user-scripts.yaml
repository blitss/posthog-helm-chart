name: sync-posthog-user-scripts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream PostHog user scripts
        shell: bash
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PostHog/posthog.git "${tmpdir}/posthog"
          git -C "${tmpdir}/posthog" sparse-checkout set posthog/user_scripts

          mkdir -p vendor/posthog
          rsync -a --delete "${tmpdir}/posthog/posthog/user_scripts/" vendor/posthog/user_scripts/
          git -C "${tmpdir}/posthog" rev-parse HEAD > vendor/posthog/UPSTREAM_COMMIT
          git -C "${tmpdir}/posthog" rev-parse --short HEAD > vendor/posthog/UPSTREAM_COMMIT_SHORT

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- vendor/posthog; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push sync
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor/posthog
          git commit -m "chore: sync PostHog user scripts"
          git push origin HEAD:${GITHUB_REF_NAME}
