apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: posthog
spec:
  interval: 5m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: posthog-chart
  dependsOn:
    - name: clickhouse-operator
  install:
    ## Skip Flux's stalled-resource wait — web/cymbal/worker need the create-buckets
    ## and migrate hooks to complete first, which happens after resource apply.
    ## Helm hooks themselves still run and are waited on.
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    disableWait: true
    remediation:
      retries: 5
  values:
    ingress:
      enabled: true
      hostname: posthog.example.com
      nginx:
        enabled: false
      traefik:
        enabled: false
      gateway:
        enabled: true
        gatewayName: posthog-gateway
        gatewayNamespace: traefik
        listenerName: posthog-https

    posthog:
      optOutCapture: true
      image:
        repository: docker.io/posthog/posthog
      env:
        # Allows creating multiple organizations in your instance (multi-tenancy). Requires a premium license.
        MULTI_ORG_ENABLED: "0"
      secretEnv:
        OIDC_RSA_PRIVATE_KEY:
          name: posthog-oidc-generated
          key: tls.key

    ## Split images — built by .github/workflows/build-posthog-images.yaml
    ## Replace OWNER below with your GitHub org/user.
    web:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-web
        tag: latest
        pullPolicy: Always
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          memory: 8Gi

    ## PostgreSQL — CNPG (external)
    postgresql:
      enabled: false
    externalPostgresql:
      host: posthog-pg-rw
      port: 5432
      database: posthog
      personsDatabase: posthog_persons
      cyclotronDatabase: cyclotron
      secretName: posthog-pg-app
      usernameKey: username
      passwordKey: password

    ## ClickHouse — Altinity operator (external)
    clickhouse:
      enabled: false
      database: posthog
    externalClickhouse:
      host: clickhouse-posthog.posthog.svc.cluster.local
      user: default
      apiUser: api
      appUser: app
      cluster: posthog
      migrationsCluster: posthog
      singleShardCluster: posthog
      writableCluster: posthog
      primaryReplicaCluster: posthog
      logsCluster: posthog
      secretName: posthog-clickhouse-password
      secretPasswordKey: password

    ## Kafka — Redpanda via operator (external)
    kafka:
      enabled: false
    externalKafka:
      brokers: posthog-redpanda.posthog.svc.cluster.local:9093

    ## Redis, Elasticsearch — bundled via chart
    redis:
      enabled: true
    elasticsearch:
      enabled: true
    ## ZooKeeper not needed — ClickHouse uses ClickHouseKeeperInstallation
    zookeeper:
      enabled: false

    minio:
      enabled: false
    seaweedfs:
      enabled: false
    objectStorage:
      enabled: true

    externalObjectStorage:
      endpoint: https://example-account-id.r2.cloudflarestorage.com
      accessKey: REPLACE_ME
      secretKey: REPLACE_ME

    externalSeaweedfs:
      endpoint: https://example-account-id.r2.cloudflarestorage.com
      accessKey: REPLACE_ME
      secretKey: REPLACE_ME

    temporal:
      enabled: true
      server:
        image:
          repository: docker.io/temporalio/auto-setup
          tag: "1.29.5@sha256:7eaaed21322c8bc98977fab38873847958024e01ffcc1efeffcd474c4f6461ca"
      adminTools:
        image:
          repository: docker.io/temporalio/admin-tools
          tag: "1.30.3@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741"
      ui:
        image:
          repository: docker.io/temporalio/ui
          tag: "2.48.1@sha256:edb5dd1b3e0ddb35611939dde9b573533afd6fbafbbf077b73c7131a30ca91ff"

    worker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest
        pullPolicy: Always
      extraEnv:
        - name: CELERY_WORKER_CONCURRENCY
          value: "2"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 8Gi

    workerExports:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker-exports
        tag: latest
        pullPolicy: Always

    temporalDjangoWorker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest
        pullPolicy: Always

    migrate:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest
        pullPolicy: Always

    asyncMigrationsCheck:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest
        pullPolicy: Always

    plugins:
      image:
        repository: docker.io/posthog/posthog-node
        tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235

    capture:
      image:
        repository: ghcr.io/posthog/posthog/capture
    replayCapture:
      image:
        repository: ghcr.io/posthog/posthog/capture
    captureAi:
      image:
        repository: ghcr.io/posthog/posthog/capture
    captureLogs:
      image:
        repository: ghcr.io/posthog/posthog/capture-logs
    featureFlags:
      image:
        repository: ghcr.io/posthog/posthog/feature-flags
    propertyDefsRs:
      image:
        repository: ghcr.io/posthog/posthog/property-defs-rs
    livestream:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/livestream
    cymbal:
      image:
        repository: ghcr.io/posthog/posthog/cymbal
    cyclotronJanitor:
      image:
        repository: ghcr.io/posthog/posthog/cyclotron-janitor

    global:
      containerSecurityContext: {}
      podSecurityContext: {}

    networkPolicies:
      enabled: false
