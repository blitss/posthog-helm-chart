apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: posthog
spec:
  interval: 30m
  timeout: 20m
  chartRef:
    kind: OCIRepository
    name: posthog-chart
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      hostname: posthog.example.com

    posthog:
      optOutCapture: true

    postgresql:
      enabled: false

    externalPostgresql:
      host: posthog-pg-postgresql
      port: 5432
      database: posthog
      personsDatabase: posthog
      cyclotronDatabase: cyclotron
      secretName: posthog-pg-postgresql-account-postgres
      usernameKey: username
      passwordKey: password

    global:
      extraEnv:
        - name: MULTI_ORG_ENABLED
          value: "1"
