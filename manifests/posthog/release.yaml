apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posthog
  namespace: posthog
spec:
  interval: 5m
  timeout: 45m
  chartRef:
    kind: OCIRepository
    name: posthog-chart
  dependsOn:
    - name: clickhouse-operator
  install:
    ## Skip Flux's stalled-resource wait — web/cymbal/worker need the create-buckets
    ## and migrate hooks to complete first, which happens after resource apply.
    ## Helm hooks themselves still run and are waited on.
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    disableWait: true
    remediation:
      retries: 5
  values:
    ingress:
      enabled: true
      hostname: posthog.example.com
      nginx:
        enabled: false
      traefik:
        enabled: false
      gateway:
        enabled: true
        gatewayName: posthog-gateway
        gatewayNamespace: traefik
        listenerName: posthog-https

    posthog:
      optOutCapture: true
      image:
        repository: ghcr.io/blitss/posthog-web
        tag: latest@sha256:51f0b4bc29357f818a38544460fd4c3922b3b3a943ac12b241ad5d6620dc2121
        pullPolicy: Always
      env:
        # Allows creating multiple organizations in your instance (multi-tenancy). Requires a premium license.
        MULTI_ORG_ENABLED: "0"
      secretEnv:
        OIDC_RSA_PRIVATE_KEY:
          name: posthog-oidc-generated
          key: tls.key
    web:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-web
        tag: latest@sha256:51f0b4bc29357f818a38544460fd4c3922b3b3a943ac12b241ad5d6620dc2121
        pullPolicy: Always
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

    ## PostgreSQL — CNPG (external)
    postgresql:
      enabled: false
    externalPostgresql:
      host: posthog-pg-rw
      port: 5432
      database: posthog
      personsDatabase: posthog_persons
      cyclotronDatabase: cyclotron
      secretName: posthog-pg-app
      usernameKey: username
      passwordKey: password

    ## ClickHouse — Altinity operator (external)
    clickhouse:
      enabled: false
      database: posthog
    externalClickhouse:
      host: clickhouse-posthog.posthog.svc.cluster.local
      user: default
      apiUser: api
      appUser: app
      logsDatabase: default
      cluster: posthog
      secretName: posthog-clickhouse-password
      secretPasswordKey: password

    ## Kafka — Redpanda via operator (external)
    kafka:
      enabled: false
    kafkaInit:
      image:
        repository: bitnamilegacy/kafka
        tag: "4.0@sha256:f45d5b813412e1ef7ce67b467309a84e4c6dc03d7626a0b6da867db9b69bd107"
        pullPolicy: IfNotPresent
    externalKafka:
      brokers: posthog-redpanda.posthog.svc.cluster.local:9093

    ## Redis — bundled via chart. Elasticsearch is managed by ECK.
    redis:
      enabled: true
      persistence:
        enabled: false
      maxmemory: 96mb
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
    elasticsearch:
      enabled: false
    externalElasticsearch:
      host: posthog-elastic-es-http.posthog.svc.cluster.local
      scheme: http
      user: elastic
      secretName: posthog-elastic-es-elastic-user
      passwordKey: elastic
      version: v8
    zookeeper:
      enabled: false
    minio:
      enabled: false
    rustfs:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    seaweedfs:
      enabled: false
    objectStorage:
      enabled: true
    externalObjectStorage:
      # The chart uses the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    externalSeaweedfs:
      # Session recordings also target the fixed bucket name "posthog".
      endpoint: https://example.r2.cloudflarestorage.com
      accessKey: ""
      secretKey: ""
    temporal:
      enabled: true
      server:
        image:
          repository: docker.io/temporalio/auto-setup
          tag: "1.29.6@sha256:1263120feed69d82e4ca23b8ca6f1d702c3029fe70714e382966d0192318eab6"
      adminTools:
        image:
          repository: docker.io/temporalio/admin-tools
          tag: "1.31.0@sha256:3e68adcd54195a7c1222e99f2dbc32a4fdbf44ad69e3bb48e21e85c4bf417c2e"
      ui:
        image:
          repository: docker.io/temporalio/ui
          tag: "2.49.1@sha256:a066bdf5c4de689cabaf80cc357871f1db5e6d750a6bcfc42e877b913e31ef24"
    worker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:7cf6dfae93c0ed6486020494c91c08739e2d73c03771d96a5f4b4319e1d97854
        pullPolicy: Always
      replicas: 1
      concurrency: 2
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
    workerBeat:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:7cf6dfae93c0ed6486020494c91c08739e2d73c03771d96a5f4b4319e1d97854
        pullPolicy: Always
      replicas: 1
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 512Mi
    workerExports:
      enabled: true
      image:
        repository: ghcr.io/blitss/posthog-worker-exports
        tag: latest@sha256:f5eb059f6d7a63d7436c03662dc35192ddecf5ae1baa3dd9109fc8b30da9c139
        pullPolicy: Always
      replicas: 1
      queue: exports
      concurrency: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
    temporalDjangoWorker:
      image:
        repository: ghcr.io/blitss/posthog-worker
        tag: latest@sha256:7cf6dfae93c0ed6486020494c91c08739e2d73c03771d96a5f4b4319e1d97854
        pullPolicy: Always
      replicas: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 80
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
    migrate:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest@sha256:be3df3ad30e43dc81c64e8bca6129b954f978872fafdc3d2dab20c8794374d95
        pullPolicy: Always
    asyncMigrationsCheck:
      image:
        repository: ghcr.io/blitss/posthog-migrate
        tag: latest@sha256:be3df3ad30e43dc81c64e8bca6129b954f978872fafdc3d2dab20c8794374d95
        pullPolicy: Always
    plugins:
      image:
        repository: docker.io/posthog/posthog-node
        tag: latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
    capture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:e31d1e1b1f5cb31dc1909882b6d523b2fbfd071b65320988c71c4b1c5f05400d
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    replayCapture:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:e31d1e1b1f5cb31dc1909882b6d523b2fbfd071b65320988c71c4b1c5f05400d
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    captureAi:
      image:
        repository: ghcr.io/posthog/posthog/capture
        tag: master@sha256:e31d1e1b1f5cb31dc1909882b6d523b2fbfd071b65320988c71c4b1c5f05400d
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    captureLogs:
      image:
        repository: ghcr.io/posthog/posthog/capture-logs
        tag: master@sha256:47e457d10a4cbcf8b3225ddd6f8be3e08a56cb38b8fbb31b0129a03850d22e99
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    featureFlags:
      image:
        repository: ghcr.io/posthog/posthog/feature-flags
        tag: master@sha256:34e0608188c53790cebcdd5b2df56be1d0b448832513a39d673940f9ab3b387e
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    hypercacheServer:
      image:
        repository: ghcr.io/posthog/posthog/hypercache-server
        tag: master@sha256:fb0faa4c3fb312dc25886136952bbd4064ecc15b4e48b7bd8bcd3303c7850b05
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    propertyDefsRs:
      image:
        repository: ghcr.io/posthog/posthog/property-defs-rs
        tag: master@sha256:6bdc2de9f42e7d8a6491f828b17578cc96f4016b9e787648906ba3d55d088762
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    livestream:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/livestream
        tag: master@sha256:211f1d57e9f19729318ab306b90fe75d18a143d93230e8c68293a5f1c34867f4
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    cymbal:
      image:
        repository: ghcr.io/posthog/posthog/cymbal
        tag: master@sha256:43af2ed40c9c33f0da08899bedb37fa95e97168be6cb3fc654b28b0a19cb05b4
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    cyclotronJanitor:
      image:
        repository: ghcr.io/posthog/posthog/cyclotron-janitor
        tag: master@sha256:570d826e5eca2fc4ac71a55d514d1013d18ee929c02d1c554d4dab113ce53e72
    ## Keep this manifest schedulable on a single-node kind cluster while
    ## still deploying the full happy-path service graph.
    ingestionGeneral:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
    ingestionSessionReplay:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    recordingApi:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    ingestionErrorTracking:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    ingestionLogs:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    ingestionTraces:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    ## Personhog services — route all persons reads through the in-cluster router.
    personhog:
      enabled: true
      rolloutPercentage: 100
    personhogReplica:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/personhog-replica
        tag: master@sha256:5d4fa8501c5defeb3418ede2de5a016b2942c2f8b57f07515077cb15ee29f673
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    personhogRouter:
      enabled: true
      image:
        repository: ghcr.io/posthog/posthog/personhog-router
        tag: master@sha256:f20bf246db133ad13558510e32298990f4c1128d851aa0f489ad9a954bc38d0b
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    global:
      containerSecurityContext: {}
      podSecurityContext: {}
    networkPolicies:
      enabled: false
