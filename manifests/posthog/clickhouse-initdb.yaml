apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-clickhouse-initdb
  namespace: posthog
data:
  01_init_posthog.sh: |
    #!/bin/bash
    set -e

    CLICKHOUSE_DB="${CLICKHOUSE_DB:-posthog}"
    case "${CLICKHOUSE_DB}" in
      *[!A-Za-z0-9_]*)
        echo "Invalid CLICKHOUSE_DB: ${CLICKHOUSE_DB}" >&2
        exit 1
        ;;
    esac

    echo "Creating ${CLICKHOUSE_DB} database..."
    clickhouse client -n <<-EOSQL
      CREATE DATABASE IF NOT EXISTS ${CLICKHOUSE_DB};
    EOSQL

    echo "Flushing logs to create system log tables..."
    clickhouse client --query "SYSTEM FLUSH LOGS"

    echo "Waiting for system log tables..."
    for i in $(seq 1 30); do
      COUNT=$(clickhouse client --query "
        SELECT count()
        FROM system.tables
        WHERE database = 'system'
          AND name IN ('crash_log', 'error_log', 'metric_log')
      ")
      if [ "$COUNT" = "3" ]; then
        echo "System log tables ready"
        exit 0
      fi
      echo "  $COUNT/3 tables ready, retrying in 2s..."
      sleep 2
    done

    echo "Timed out waiting for system log tables" >&2
    exit 1
