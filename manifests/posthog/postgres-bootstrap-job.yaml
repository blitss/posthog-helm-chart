apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-pg-bootstrap
  namespace: posthog
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: docker.io/library/postgres:16
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-pg-postgresql-account-postgres
                  key: password
          command:
            - bash
            - -ceu
            - |
              until psql "postgres://postgres:${PGPASSWORD}@posthog-pg-postgresql:5432/postgres" -c "select 1" >/dev/null 2>&1; do
                sleep 5
              done

              psql "postgres://postgres:${PGPASSWORD}@posthog-pg-postgresql:5432/postgres" <<'SQL'
              SELECT 'CREATE DATABASE posthog' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'posthog')\gexec
              SELECT 'CREATE DATABASE cyclotron' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'cyclotron')\gexec
              SQL
