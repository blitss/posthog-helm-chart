apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: posthog-oidc-keypair
  namespace: posthog
spec:
  secretName: posthog-oidc-generated
  commonName: posthog-oidc
  issuerRef:
    name: selfsigned
    kind: Issuer
  privateKey:
    algorithm: RSA
    size: 4096
    encoding: PKCS8
  dnsNames:
    - posthog-oidc.local
