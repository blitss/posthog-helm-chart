apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeblocks
  namespace: kb-system
spec:
  releaseName: kubeblocks
  chart:
    spec:
      chart: kubeblocks
      sourceRef:
        kind: HelmRepository
        name: kubeblocks
        namespace: kb-system
      version: "1.0.2"
  values:
    image:
      registry: docker.io
      repository: apecloud/kubeblocks
      tools:
        repository: apecloud/kubeblocks-tools
    dataProtection:
      image:
        registry: docker.io
        repository: apecloud/kubeblocks-dataprotection
        datasafed:
          repository: apecloud/datasafed
  interval: 1h0m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
