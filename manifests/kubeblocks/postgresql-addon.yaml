apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kb-addon-postgresql
  namespace: kb-system
spec:
  releaseName: kb-addon-postgresql
  dependsOn:
    - name: kubeblocks
  chart:
    spec:
      chart: apecloud-postgresql
      sourceRef:
        kind: HelmRepository
        name: kubeblocks
        namespace: kb-system
      version: "1.0.1"
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
